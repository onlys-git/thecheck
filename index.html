<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheCheck</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#0f1720;
      --bg2:#1a2332;
      --card:rgba(255,255,255,.78);
      --card-dark:rgba(15,23,32,.72);
      --line:rgba(255,255,255,.10);
      --line-soft:rgba(15,23,42,.10);
      --text:#f8fafc;
      --text-dark:#0f172a;
      --sub:#cbd5e1;
      --sub-dark:#64748b;
      --primary:#5b8cff;
      --success:#34c759;
      --danger:#ff5a52;
      --warning:#ffb020;
      --neutral:#94a3b8;
      --primary-soft:rgba(91,140,255,.14);
      --success-soft:rgba(52,199,89,.14);
      --danger-soft:rgba(255,90,82,.14);
      --warning-soft:rgba(255,176,32,.16);
      --neutral-soft:rgba(148,163,184,.16);
      --shadow:0 18px 40px rgba(0,0,0,.22);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(91,140,255,.16), transparent 28%),
        radial-gradient(circle at top right, rgba(52,199,89,.08), transparent 24%),
        linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
      color:var(--text);
      letter-spacing:-.01em;
    }
    .wrap{max-width:1460px;margin:0 auto;padding:20px}
    .panel{
      background:var(--card-dark);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      margin-bottom:16px;
      backdrop-filter:saturate(180%) blur(20px);
      -webkit-backdrop-filter:saturate(180%) blur(20px);
    }
    .hero{
      padding:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.00));
    }
    h1,h2,p{margin:0}
    h1{font-size:32px;font-weight:700;letter-spacing:-.03em;color:#fff}
    .muted{color:var(--sub);font-size:14px;line-height:1.6}
    .toolbar{padding:16px}
    .toolbar-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .section-title{padding:18px 18px 0;font-size:19px;font-weight:650;letter-spacing:-.02em;color:#fff}
    .section-body{padding:18px}
    input,select,button,textarea{font:inherit}
    input,select,textarea{
      width:100%;
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      background:rgba(255,255,255,.08);
      color:#fff;
      outline:none;
      transition:border-color .12s ease, box-shadow .12s ease, transform .12s ease, background .12s ease;
    }
    input::placeholder, textarea::placeholder{color:rgba(226,232,240,.72)}
    input:focus,select:focus,textarea:focus{
      border-color:rgba(91,140,255,.50);
      box-shadow:0 0 0 4px rgba(91,140,255,.14);
      background:rgba(255,255,255,.11);
    }
    input,select{min-height:48px;padding:12px 14px}
    input[type="file"]{padding:10px 12px;min-height:auto}
    textarea{min-height:84px;padding:10px 12px;resize:vertical}
    button{
      min-height:44px;
      border:1px solid transparent;
      border-radius:16px;
      padding:11px 14px;
      background:rgba(255,255,255,.10);
      color:#fff;
      font-weight:600;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease, filter .12s ease, background .12s ease;
    }
    button:hover{transform:translateY(-1px);box-shadow:0 10px 20px rgba(0,0,0,.18)}
    button:active{transform:translateY(0)}
    button.primary{background:var(--primary);color:#fff}
    button.green{background:var(--success);color:#fff}
    button.red{background:var(--danger);color:#fff}
    button.orange{background:var(--warning);color:#1f2937}
    button.gray{background:var(--neutral);color:#0f172a}
    button.ghost{
      background:rgba(255,255,255,.08);
      color:#e2e8f0;
      border-color:rgba(255,255,255,.10);
    }
    button.small{min-height:32px;padding:6px 10px;border-radius:12px;font-size:12px}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .stat{
      padding:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }
    .label{font-size:12px;color:var(--sub);margin-bottom:6px}
    .value{font-size:28px;font-weight:700;letter-spacing:-.03em;color:#fff}
    .layout{display:grid;grid-template-columns:390px 1fr;gap:16px}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .chip-wrap{display:inline-flex;gap:6px;align-items:center}
    .chip{
      padding:10px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      color:#e2e8f0;
    }
    .chip.active{background:#fff;color:#111827;border-color:#fff}
    .notice{padding:11px 12px;border-radius:16px;font-size:13px;margin-top:8px}
    .notice.blue{background:rgba(91,140,255,.14);color:#dbeafe}
    .notice.orange{background:rgba(255,176,32,.14);color:#fef3c7}
    .notice.green{background:rgba(52,199,89,.12);color:#dcfce7}
    .student-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .student-card{
      border:1px solid rgba(255,255,255,.10);
      border-radius:22px;
      background:var(--card);
      color:var(--text-dark);
      padding:16px;
      box-shadow:0 10px 24px rgba(0,0,0,.16);
    }
    .student-head{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:10px}
    .name-wrap{display:flex;gap:10px;align-items:center;min-width:0}
    .num{
      width:44px;height:44px;border-radius:999px;
      background:#e2e8f0;color:#334155;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:700;flex-shrink:0;
      overflow:hidden;
      background-size:cover;
      background-position:center;
      border:1px solid rgba(15,23,42,.08)
    }
    .num.photo{background-color:#fff;color:transparent}
    .num.placeholder{width:44px;height:44px}
    .name{font-size:19px;font-weight:700;color:#0f172a}
    .badge{min-width:88px;height:88px;padding:0 14px;border-radius:999px;font-size:16px;font-weight:900;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;box-shadow:none;letter-spacing:-.02em;border:1px solid transparent}
    .ok{background:#00c73c;color:#fff;border:1px solid #00c73c}
    .idle{background:#eef2f7;color:#475569}
    .absent{background:#ff3b30;color:#fff;border:1px solid #ff3b30}
    .leave{background:rgba(139,92,246,.14);color:#6d28d9}
    .late{background:rgba(255,176,32,.18);color:#b45309}
    .na{background:#e2e8f0;color:#475569}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .actions.three{grid-template-columns:1fr 1fr 1fr}
    .note-box{display:grid;gap:8px;margin-top:10px}
    .student-card textarea, .student-card input, .student-card select{
      background:#fff;
      border:1px solid rgba(15,23,42,.10);
      color:#0f172a;
    }
    .student-card textarea::placeholder{color:#94a3b8}
    .table-wrap{
      overflow:auto;
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      background:rgba(255,255,255,.06);
      margin-top:10px;
    }
    table{width:100%;border-collapse:collapse;min-width:860px}
    th,td{padding:11px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;font-size:13px;vertical-align:top;color:#e5e7eb}
    th{background:rgba(255,255,255,.05);position:sticky;top:0}
    .summary-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin:10px 0}
    .summary-card{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:12px;
    }
    .summary-card .k{font-size:12px;color:var(--sub)}
    .summary-card .v{font-size:22px;font-weight:700;margin-top:4px;color:#fff}
    .side-list{display:grid;gap:8px;max-height:320px;overflow:auto}
    .mini-item{
      display:flex;justify-content:space-between;gap:8px;align-items:center;
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:10px 12px;
      background:rgba(255,255,255,.06);
      color:#e5e7eb;
    }
    .meta-btn{
      background:rgba(255,255,255,.10) !important;
      color:#1f2937 !important;
      border:1px solid rgba(15,23,42,.08) !important;
      box-shadow:none !important;
    }
    .meta-btn:hover{
      background:rgba(255,255,255,.20) !important;
      color:#0f172a !important;
    }
    .student-card .meta-btn{
      background:rgba(255,255,255,.68) !important;
      color:#334155 !important;
      border:1px solid rgba(15,23,42,.08) !important;
    }
    .student-card .meta-btn:hover{
      background:#ffffff !important;
      color:#0f172a !important;
      box-shadow:0 6px 14px rgba(15,23,42,.08) !important;
    }
    .action-btn{
      min-height:40px !important;
      padding:8px 12px !important;
      border-radius:14px !important;
      font-size:14px !important;
      font-weight:700 !important;
      box-shadow:none !important;
    }
    .action-submit{background:rgba(52,199,89,.16) !important;color:#166534 !important;border:1px solid rgba(52,199,89,.22) !important;}
    .action-missing{background:rgba(148,163,184,.16) !important;color:#475569 !important;border:1px solid rgba(148,163,184,.22) !important;}
    .action-na{background:rgba(100,116,139,.16) !important;color:#334155 !important;border:1px solid rgba(100,116,139,.22) !important; white-space:nowrap !important;}
    .action-unchecked{background:rgba(148,163,184,.14) !important;color:#475569 !important;border:1px solid rgba(148,163,184,.22) !important;}
    .action-absent{background:rgba(255,90,82,.14) !important;color:#be123c !important;border:1px solid rgba(255,90,82,.20) !important;}
    .action-leave{background:rgba(139,92,246,.14) !important;color:#6d28d9 !important;border:1px solid rgba(139,92,246,.20) !important;}
    .action-late{background:rgba(255,176,32,.18) !important;color:#b45309 !important;border:1px solid rgba(255,176,32,.22) !important;}

    @media (min-width:1200px){.student-grid{grid-template-columns:repeat(3,1fr)}}
    @media (max-width:1100px){
      .layout{grid-template-columns:1fr}
      .stats{grid-template-columns:repeat(2,1fr)}
      .student-grid{grid-template-columns:1fr}
      .summary-grid{grid-template-columns:repeat(3,1fr)}
    }
  
    .top-shell{padding:0;overflow:hidden}
    .top-brand{
      display:flex;align-items:center;justify-content:space-between;gap:20px;
      padding:22px 24px;
      background:linear-gradient(135deg, rgba(255,255,255,.04), rgba(91,140,255,.08));
    }
    .brand-copy{display:flex;flex-direction:column;gap:6px}
    .brand-eyebrow{
      font-size:13px;font-weight:700;letter-spacing:.02em;
      color:#cbd5e1;
    }
    .brand-mascot{
      width:110px;height:110px;display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:8px;flex-shrink:0;
    }
    .brand-mascot img{max-width:100%;max-height:100%;object-fit:contain;border-radius:18px}
    @media (max-width:900px){
      .top-brand{flex-direction:column;align-items:flex-start}
      .brand-mascot{width:92px;height:92px}
    }

    .toolbar-grid{
      display:grid;
      grid-template-columns:minmax(320px, 1.25fr) auto auto;
      gap:12px;
      align-items:start;
    }
    .toolbar-group{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .toolbar-main input,
    .toolbar-main select{
      flex:1 1 0;
      min-width:150px;
      max-width:none !important;
    }
    .toolbar-actions,
    .toolbar-utils{
      justify-content:flex-start;
    }
    .toolbar-actions button,
    .toolbar-utils button{
      white-space:nowrap;
    }
    .toolbar-status{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    @media (max-width:1200px){
      .toolbar-grid{
        grid-template-columns:1fr;
      }
      .toolbar-main{
        display:grid;
        grid-template-columns:1fr 1fr 1fr;
      }
      .toolbar-main input,
      .toolbar-main select{
        min-width:0;
      }
    }
    @media (max-width:760px){
      .toolbar-main{
        grid-template-columns:1fr;
      }
    }

    .compact-status{
      gap:4px;
      min-height:24px;
    }
    .compact-status .muted{
      font-size:12px;
      line-height:1.3;
    }
    #cloudStatus:empty{
      display:none;
    }

    .current-category-banner{
      margin-top:4px;
      font-size:28px;
      font-weight:900;
      letter-spacing:-.03em;
      color:#ffffff;
      line-height:1.2;
    }
    .current-category-banner span{
      color:#93c5fd;
    }
    @media (max-width:900px){
      .current-category-banner{
        font-size:22px;
      }
    }
</style>
</head>

let state=loadState(), currentDate=today(), currentCategory=(state.categories[0]==="출결 체크"?"출결":state.categories[0])||"출결", filterMode="all", draftNotes={}, currentWeekKey="";

function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function formatDate(s){if(!s) return "-"; const [y,m,d]=s.split("-"); return `${y}.${m}.${d}`}
function normalize(s){return (s||"").replace(/\s+/g,"").trim()}
function getStudentPhoto(name){return STUDENT_PHOTOS[name]||""}
function isAttendanceCategory(category){return category==="출결" || category==="출결 체크"}
function isWeeklyCategory(category){return !isAttendanceCategory(category)}
function getWeekStart(dateStr){
  const [y,m,d]=dateStr.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  const day = dt.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  const yy = dt.getFullYear();
  const mm = String(dt.getMonth()+1).padStart(2,"0");
  const dd = String(dt.getDate()).padStart(2,"0");
  return `${yy}-${mm}-${dd}`;
}
function addDays(dateStr, days){
  const [y,m,d]=dateStr.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + days);
  const yy = dt.getFullYear();
  const mm = String(dt.getMonth()+1).padStart(2,"0");
  const dd = String(dt.getDate()).padStart(2,"0");
  return `${yy}-${mm}-${dd}`;
}
function getMonthWeek(dateStr){
  return getWeekStart(dateStr);
}
function getWeekOptions(dateStr){
  const activeStart = getWeekStart(dateStr);
  const arr=[];
  for(let i=-2;i<=6;i++){
    const start = addDays(activeStart, i*7);
    const end = addDays(start, 6);
    const [,sm,sd] = start.split("-");
    const [,em,ed] = end.split("-");
    const label = sm===em ? `${sm}.${sd} ~ ${ed}` : `${sm}.${sd} ~ ${em}.${ed}`;
    arr.push({key:start,label});
  }
  return arr;
}
function formatPeriodKey(periodKey){
  if(/^\d{4}-\d{2}-\d{2}$/.test(periodKey) && !isAttendanceCategory(currentCategory)){
    const end = addDays(periodKey, 6);
    const [,sm,sd] = periodKey.split("-");
    const [,em,ed] = end.split("-");
    return sm===em ? `${sm}.${sd} ~ ${ed}` : `${sm}.${sd} ~ ${em}.${ed}`;
  }
  return formatDate(periodKey);
}
function normalizeValue(category, value){
  if(isAttendanceCategory(category)){
    if(value==="결석" || value==="조퇴" || value==="지각" || value==="미체크") return value;
    return "미체크";
  }
  if(value===true || value==="true" || value===1 || value==="1" || value==="제출") return "제출";
  if(value==="해당 없음") return "해당 없음";
  if(value===false || value==="false" || value===0 || value==="0" || value==="미제출" || value==="" || value==null) return "미제출";
  return "미제출";
}
function emptyRecord(categories){const rec={}; categories.forEach(cat=>rec[cat]={value:isAttendanceCategory(cat)?"미체크":"미제출",note:""}); return rec}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return {students:[...DEFAULT_STUDENTS],categories:[...DEFAULT_CATEGORIES],records:{}};
    const p=JSON.parse(raw);
    const students = Array.isArray(p.students)?p.students:[...DEFAULT_STUDENTS];
    let categories = Array.isArray(p.categories)?p.categories:[...DEFAULT_CATEGORIES];
    let records = p.records&&typeof p.records==="object"?p.records:{};

    // legacy migration: "출결 체크" -> "출결"
    categories = categories.map(cat => cat==="출결 체크" ? "출결" : cat);
    categories = [...new Set(categories)];

    Object.keys(records).forEach(period=>{
      const day = records[period];
      if(!day || typeof day!=="object") return;
      Object.keys(day).forEach(student=>{
        const rec = day[student];
        if(rec && typeof rec==="object" && rec["출결 체크"] && !rec["출결"]){
          rec["출결"] = rec["출결 체크"];
          delete rec["출결 체크"];
        } else if(rec && typeof rec==="object" && rec["출결 체크"] && rec["출결"]){
          delete rec["출결 체크"];
        }
        if(rec && typeof rec==="object"){
          Object.keys(rec).forEach(cat=>{
            const entry = rec[cat];
            if(entry && typeof entry==="object" && "value" in entry){
              entry.value = normalizeValue(cat, entry.value);
            } else {
              rec[cat] = { value: normalizeValue(cat, entry), note: "" };
            }
          });
        }
      });
    });

    return {students, categories, records};
  }catch(e){
    return {students:[...DEFAULT_STUDENTS],categories:[...DEFAULT_CATEGORIES],records:{}};
  }
}
function saveState(){localStorage.setItem(STORAGE_KEY, JSON.stringify(state))}
function getDefaultValue(category){return isAttendanceCategory(category)?"미체크":"미제출"}
function ensurePeriodRecord(periodKey){if(!state.records[periodKey]) state.records[periodKey]={}; state.students.forEach(student=>{if(!state.records[periodKey][student]) state.records[periodKey][student]=emptyRecord(state.categories); state.categories.forEach(cat=>{const e=state.records[periodKey][student][cat]; if(!e) state.records[periodKey][student][cat]={value:getDefaultValue(cat),note:""}; else if(typeof e!=="object"||!("value" in e)) state.records[periodKey][student][cat]={value:normalizeValue(cat,e),note:""}; else state.records[periodKey][student][cat]={value:normalizeValue(cat,e.value),note:e.note||""}})})}
function refreshCurrentWeekKey(){const opts=getWeekOptions(currentDate), auto=getMonthWeek(currentDate), valid=opts.map(o=>o.key); if(!valid.includes(currentWeekKey)) currentWeekKey=auto}
function getCurrentPeriodKey(){return isAttendanceCategory(currentCategory)?currentDate:currentWeekKey}
function renameStudent(oldName,newName){newName=(newName||"").trim(); if(!newName||oldName===newName) return; if(state.students.includes(newName)){alert("이미 있는 학생 이름이야."); return;} state.students=state.students.map(n=>n===oldName?newName:n); Object.keys(state.records).forEach(period=>{const rec=state.records[period][oldName]; if(rec){state.records[period][newName]=rec; delete state.records[period][oldName]}}); if(draftNotes[oldName]!==undefined){draftNotes[newName]=draftNotes[oldName]; delete draftNotes[oldName]}}
function deleteStudent(name){if(!confirm(`${name} 학생을 삭제할까요? 저장된 기록에서도 함께 제거돼요.`)) return; state.students=state.students.filter(n=>n!==name); Object.keys(state.records).forEach(period=>{if(state.records[period]&&state.records[period][name]) delete state.records[period][name]}); if(draftNotes[name]!==undefined) delete draftNotes[name]; saveState(); render()}
function replaceAllStudents(names){const unique=[...new Set((names||[]).map(n=>String(n).trim()).filter(Boolean))]; if(!unique.length){alert("불러올 학생 이름이 없어요."); return;} if(!confirm("현재 학생 명단을 새 명단으로 전체 교체할까요? 기존 기록은 같은 이름 학생만 유지되고, 없는 학생 기록은 사라질 수 있어요.")) return; state.students=unique; Object.keys(state.records).forEach(period=>{const oldSet=state.records[period]||{}, newSet={}; state.students.forEach(student=>{newSet[student]=oldSet[student]||emptyRecord(state.categories)}); state.records[period]=newSet}); draftNotes={}; render()}
function addStudents(names){const unique=[...new Set((names||[]).map(n=>String(n).trim()).filter(Boolean))], toAdd=unique.filter(n=>!state.students.includes(n)); if(!toAdd.length){alert("추가할 새 이름이 없어요."); return;} state.students.push(...toAdd); render()}
function parseNamesFromText(text){return String(text||"").split(/\r?\n|,|\t|;/).map(s=>s.trim()).filter(Boolean)}
function parseNamesFromRows(rows){const names=[]; rows.forEach(row=>{if(Array.isArray(row)){const first=row.find(cell=>String(cell||"").trim()!==""); if(first) names.push(String(first).trim())} else if(row&&typeof row==="object"){const vals=Object.values(row).map(v=>String(v||"").trim()).filter(Boolean); if(vals[0]) names.push(vals[0])}}); return names.filter(Boolean)}
function handleFileImport(replaceMode){const file=document.getElementById("studentFileInput").files?.[0]; if(!file){alert("먼저 파일을 선택해줘."); return;} const name=(file.name||"").toLowerCase(); if(name.endsWith(".csv")){const reader=new FileReader(); reader.onload=e=>{const names=parseNamesFromText(e.target.result||""); replaceMode?replaceAllStudents(names):addStudents(names)}; reader.readAsText(file,"utf-8"); return;} if((name.endsWith(".xlsx")||name.endsWith(".xls"))&&window.XLSX){const reader=new FileReader(); reader.onload=e=>{try{const data=new Uint8Array(e.target.result); const wb=XLSX.read(data,{type:"array"}); const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1}); const names=parseNamesFromRows(rows); replaceMode?replaceAllStudents(names):addStudents(names)}catch(err){alert("엑셀 파일을 읽는 중 문제가 생겼어요. CSV로 저장해서 다시 시도해보면 더 잘 될 수 있어요.")}}; reader.readAsArrayBuffer(file); return;} alert("지원하지 않는 파일 형식이에요. CSV 또는 XLSX 파일을 사용해줘.")}
function exportBackup(){const payload={app:"student_check_app_weekly",version:1,exportedAt:new Date().toISOString(),state}; const text=JSON.stringify(payload,null,2); const blob=new Blob([text],{type:"application/json;charset=utf-8;"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`학생체크_전체백업_${currentDate}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url)}
function restoreBackupFromFile(file){if(!file){alert("백업 파일을 선택해줘."); return;} const reader=new FileReader(); reader.onload=e=>{try{const parsed=JSON.parse(e.target.result||"{}"); const restored=parsed&&parsed.state?parsed.state:parsed; if(!restored||!Array.isArray(restored.students)||!Array.isArray(restored.categories)||typeof restored.records!=="object"){alert("올바른 백업 파일 형식이 아니야."); return;} if(!confirm("현재 데이터를 백업 파일 내용으로 덮어쓸까요?")) return; state={students:restored.students,categories:restored.categories,records:restored.records||{}}; draftNotes={}; currentCategory=(state.categories[0]==="출결 체크"?"출결":state.categories[0])||"출결"; refreshCurrentWeekKey(); ensurePeriodRecord(getCurrentPeriodKey()); saveState(); render(); alert("백업 파일을 불러왔어.")}catch(err){alert("백업 파일을 읽는 중 문제가 생겼어.")}}; reader.readAsText(file,"utf-8")}
function checkedCount(){const period=getCurrentPeriodKey(); ensurePeriodRecord(period); return state.students.filter(student=>{const value=normalizeValue(currentCategory, state.records[period][student]?.[currentCategory]?.value); if(isAttendanceCategory(currentCategory)) return value!=="미체크"; return value==="제출"||value==="해당 없음"}).length}
function filteredStudents(){const period=getCurrentPeriodKey(); ensurePeriodRecord(period); const q=normalize(document.getElementById("searchInput").value); return state.students.filter(student=>{if(q&&!normalize(student).includes(q)) return false; const value=normalizeValue(currentCategory, state.records[period][student]?.[currentCategory]?.value); const checked=isAttendanceCategory(currentCategory)?value!=="미체크":(value==="제출"||value==="해당 없음"); if(filterMode==="checked") return checked; if(filterMode==="unchecked") return !checked; return true})}
function badge(entry,attendance){const value=entry?.value; if(attendance){if(value==="결석") return '<span class="badge absent">결석</span>'; if(value==="조퇴") return '<span class="badge leave">조퇴</span>'; if(value==="지각") return '<span class="badge late">지각</span>'; return '<span class="badge idle">미체크</span>'} if(value==="제출") return '<span class="badge ok">제출</span>'; if(value==="해당 없음") return '<span class="badge na">해당 없음</span>'; return '<span class="badge absent">미제출</span>'}
function renderSelectors(){refreshCurrentWeekKey(); const catSel=document.getElementById("currentCategory"), currentCat=currentCategory; catSel.innerHTML=""; state.categories.forEach(cat=>{const op=document.createElement("option"); op.value=cat; op.textContent=cat; if(cat===currentCat) op.selected=true; catSel.appendChild(op)}); const weekSel=document.getElementById("weekSelect"), opts=getWeekOptions(currentDate); weekSel.innerHTML=""; opts.forEach(o=>{const op=document.createElement("option"); op.value=o.key; op.textContent=o.label; if(o.key===currentWeekKey) op.selected=true; weekSel.appendChild(op)}); weekSel.style.display=isAttendanceCategory(currentCategory)?"none":"inline-block"; const dateEl=document.getElementById("currentDate"); if(dateEl) dateEl.style.display=isAttendanceCategory(currentCategory)?"inline-block":"none"; const histStudent=document.getElementById("historyStudent"), hs=histStudent.value||"전체"; histStudent.innerHTML='<option value="전체">전체 학생</option>'; state.students.forEach(s=>{const op=document.createElement("option"); op.value=s; op.textContent=s; histStudent.appendChild(op)}); histStudent.value=state.students.includes(hs)?hs:"전체"; const histCategory=document.getElementById("historyCategory"), hc=histCategory.value||"전체"; histCategory.innerHTML='<option value="전체">전체 항목</option>'; state.categories.forEach(c=>{const op=document.createElement("option"); op.value=c; op.textContent=c; histCategory.appendChild(op)}); histCategory.value=state.categories.includes(hc)?hc:"전체"; document.getElementById("modeHint").textContent=isAttendanceCategory(currentCategory)?"출결은 날짜 기준":"주간 항목은 월~일 기준"}
function renderChips(){const box=document.getElementById("categoryChips"); box.innerHTML=""; state.categories.forEach(cat=>{const wrap=document.createElement("div"); wrap.className="chip-wrap"; const btn=document.createElement("button"); btn.className="chip"+(cat===currentCategory?" active":""); btn.textContent=cat; btn.onclick=()=>{currentCategory=cat; draftNotes={}; refreshCurrentWeekKey(); render()}; wrap.appendChild(btn); if(!DEFAULT_CATEGORIES.includes(cat)){const del=document.createElement("button"); del.className="red"; del.textContent="삭제"; del.onclick=()=>{if(!confirm(`'${cat}' 항목을 삭제할까?`)) return; state.categories=state.categories.filter(c=>c!==cat); Object.keys(state.records).forEach(period=>state.students.forEach(student=>delete state.records[period][student][cat])); if(!state.categories.includes(currentCategory)) currentCategory=(state.categories[0]==="출결 체크"?"출결":state.categories[0])||"출결"; saveState(); render()}; wrap.appendChild(del)} box.appendChild(wrap)})}
function renderSideList(){const box=document.getElementById("studentSideList"); box.innerHTML=""; const period=getCurrentPeriodKey(); ensurePeriodRecord(period); state.students.forEach((student,idx)=>{const entry=state.records[period][student]?.[currentCategory]; const item=document.createElement("div"); item.className="mini-item"; item.innerHTML=`<div><div style="font-weight:800">${idx+1}. ${student}</div><div class="muted" style="font-size:12px">${String(normalizeValue(currentCategory, entry?.value) ?? "-")}</div></div>`; box.appendChild(item)})}
function renderBulkArea(){const box=document.getElementById("bulkArea"); box.innerHTML=""; if(isWeeklyCategory(currentCategory)){const submit=document.createElement("button"); submit.className="green"; submit.textContent="전체 제출"; submit.onclick=()=>{const period=getCurrentPeriodKey(); ensurePeriodRecord(period); state.students.forEach(student=>{state.records[period][student][currentCategory].value="제출"}); saveState(); render()}; const missing=document.createElement("button"); missing.className="ghost"; missing.textContent="전체 미제출"; missing.onclick=()=>{const period=getCurrentPeriodKey(); ensurePeriodRecord(period); state.students.forEach(student=>{state.records[period][student][currentCategory].value="미제출"}); saveState(); render()}; const na=document.createElement("button"); na.className="gray"; na.textContent="전체 해당 없음"; na.onclick=()=>{const period=getCurrentPeriodKey(); ensurePeriodRecord(period); state.students.forEach(student=>{state.records[period][student][currentCategory].value="해당 없음"}); saveState(); render()}; box.appendChild(submit); box.appendChild(missing); box.appendChild(na)}}
function renderStudents(){const box=document.getElementById("studentGrid"); box.innerHTML=""; const period=getCurrentPeriodKey(); ensurePeriodRecord(period); filteredStudents().forEach((student,idx)=>{const entry=state.records[period][student][currentCategory]; const card=document.createElement("div"); card.className="student-card"; const weekly=isWeeklyCategory(currentCategory); card.innerHTML=`<div class="student-head"><div class="name-wrap">${getStudentPhoto(student)?`<div class="num photo" style="background-image:url(${getStudentPhoto(student)})"></div>`:`<div class="num placeholder">${idx+1}</div>`}<div class="name">${student}</div></div>${badge(entry,!weekly)}</div><div class="toolbar-row" style="margin-bottom:8px"><button class="ghost small meta-btn" data-a="rename">이름 수정</button><button class="ghost small meta-btn" data-a="delete">학생 삭제</button></div>${weekly?`<div class="actions three"><button class="action-btn action-submit" data-a="제출">제출</button><button class="action-btn action-missing" data-a="미제출">미제출</button><button class="action-btn action-na" data-a="해당 없음">해당 없음</button></div>`:`<div class="actions"><button class="action-btn action-unchecked" data-a="미체크">미체크</button><button class="action-btn action-absent" data-a="결석">결석</button><button class="action-btn action-leave" data-a="조퇴">조퇴</button><button class="action-btn action-late" data-a="지각">지각</button></div>`}<div class="note-box"><textarea placeholder="${weekly?"예: 이번 주는 과제가 없었음.":"예: 감기, 병원 진료"}">${draftNotes[student] ?? entry.note ?? ""}</textarea><button class="ghost">특기사항 저장</button></div>`; card.querySelectorAll("[data-a]").forEach(btn=>{btn.onclick=()=>{if(btn.dataset.a==="rename"){const newName=prompt("새 학생 이름을 입력해줘.", student); if(newName!==null){renameStudent(student,newName); saveState(); render()} return;} if(btn.dataset.a==="delete"){deleteStudent(student); return;} state.records[period][student][currentCategory].value=btn.dataset.a; saveState(); render()}}); const textarea=card.querySelector("textarea"); textarea.oninput=e=>{draftNotes[student]=e.target.value}; card.querySelector(".note-box button").onclick=()=>{state.records[period][student][currentCategory].note=textarea.value||""; draftNotes[student]=textarea.value||""; saveState(); render()}; box.appendChild(card)})}
function historyRows(){const start=document.getElementById("historyStart").value, end=document.getElementById("historyEnd").value, studentFilter=document.getElementById("historyStudent").value, categoryFilter=document.getElementById("historyCategory").value, mode=document.getElementById("historyMode").value; const rows=[]; Object.keys(state.records).sort().forEach(period=>{const monthKey=period.slice(0,7); if(start&&monthKey<start) return; if(end&&monthKey>end) return; state.students.forEach(student=>{const rec=state.records[period][student]; if(!rec) return; state.categories.forEach(category=>{const entry=rec[category]; if(!entry) return; const row={period,student,category,value:normalizeValue(category, entry.value),note:entry.note||""}; if(studentFilter!=="전체"&&row.student!==studentFilter) return; if(categoryFilter!=="전체"&&row.category!==categoryFilter) return; if(mode==="결석만"&&!(row.category==="출결"&&row.value==="결석")) return; if(mode==="조퇴만"&&!(row.category==="출결"&&row.value==="조퇴")) return; if(mode==="지각만"&&!(row.category==="출결"&&row.value==="지각")) return; if(mode==="미제출만"&&!(row.category!=="출결"&&row.value==="미제출")) return; if(mode==="제출만"&&!(row.category!=="출결"&&row.value==="제출")) return; if(mode==="해당없음만"&&!(row.category!=="출결"&&row.value==="해당 없음")) return; if(mode==="메모만"&&!String(row.note||"").trim()) return; rows.push(row)})})}); return rows}
function exportCsv(){const period=getCurrentPeriodKey(); ensurePeriodRecord(period); const rows=[["번호","이름","기준", ...state.categories.flatMap(cat=>[cat, `${cat} 특기사항`])]]; state.students.forEach((student,idx)=>{const row=[idx+1,student,formatPeriodKey(period)]; state.categories.forEach(cat=>{const entry=state.records[period][student][cat]; row.push(entry?.value??""); row.push(entry?.note??"")}); rows.push(row)}); const csv=rows.map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n"); const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`학생체크_${formatPeriodKey(period)}.csv`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url)}
function renderHistory(){const rows=historyRows(), body=document.getElementById("historyBody"); body.innerHTML=""; const sum={결석:0,조퇴:0,지각:0,제출:0,미제출:0,해당없음:0,메모:0}; rows.forEach(row=>{if(row.category==="출결"){if(row.value==="결석") sum.결석++; if(row.value==="조퇴") sum.조퇴++; if(row.value==="지각") sum.지각++;} else {if(row.value==="제출") sum.제출++; if(row.value==="미제출") sum.미제출++; if(row.value==="해당 없음") sum.해당없음++;} if(String(row.note||"").trim()) sum.메모++; const tr=document.createElement("tr"); tr.innerHTML=`<td>${formatPeriodKey(row.period)}</td><td>${row.student}</td><td>${row.category}</td><td>${row.value}</td><td>${row.note||"-"}</td>`; body.appendChild(tr)}); document.getElementById("sumAbsent").textContent=sum.결석; document.getElementById("sumLeave").textContent=sum.조퇴; document.getElementById("sumLate").textContent=sum.지각; document.getElementById("sumSubmitted").textContent=sum.제출; document.getElementById("sumMissing").textContent=sum.미제출; document.getElementById("sumNA").textContent=sum.해당없음; document.getElementById("sumNotes").textContent=sum.메모}
function render(){refreshCurrentWeekKey(); ensurePeriodRecord(getCurrentPeriodKey()); draftNotes={}; saveState(); document.getElementById("currentDate").value=currentDate; document.getElementById("dateLabel").textContent=formatPeriodKey(getCurrentPeriodKey());
  const catDisplay=document.getElementById("currentCategoryDisplay"); if(catDisplay) catDisplay.textContent=currentCategory; document.getElementById("totalStudents").textContent=state.students.length; const c=checkedCount(); document.getElementById("checkedCount").textContent=c; document.getElementById("uncheckedCount").textContent=state.students.length-c; renderSelectors(); renderChips(); renderSideList(); renderBulkArea(); renderStudents(); renderHistory()}

function setCloudStatus(text){
  const el = document.getElementById("cloudStatus");
  if(el) el.textContent = text;
}

async function saveCurrentToCloud() {
  try{
    setCloudStatus("저장 중");
    const period = getCurrentPeriodKey();
    ensurePeriodRecord(period);

    const rows = state.students.map(student => {
      const entry = state.records[period][student][currentCategory];
      return {
        student,
        status: normalizeValue(currentCategory, entry?.value),
        note: entry?.note || ""
      };
    });

    let payload;
    if (isAttendanceCategory(currentCategory)) {
      payload = {
        mode: "attendance",
        date: currentDate,
        rows
      };
    } else {
      payload = {
        mode: "weekly",
        week: currentWeekKey,
        category: currentCategory,
        rows
      };
    }

    const res = await fetch(SHEET_API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });

    const result = await res.json();
    if (!result.success) {
      setCloudStatus("저장 실패");
      alert("저장 실패");
      return;
    }
    setCloudStatus("저장 완료");
  }catch(err){
    setCloudStatus("저장 실패");
    alert("클라우드 저장 중 오류가 생겼어.");
  }
}

async function loadCurrentFromCloud() {
  try{
    setCloudStatus("불러오는 중");
    let reqUrl = "";

    if (isAttendanceCategory(currentCategory)) {
      reqUrl = `${SHEET_API_URL}?mode=attendance&date=${encodeURIComponent(currentDate)}`;
    } else {
      reqUrl = `${SHEET_API_URL}?mode=weekly&week=${encodeURIComponent(currentWeekKey)}&category=${encodeURIComponent(currentCategory)}`;
    }

    const res = await fetch(reqUrl);
    const result = await res.json();

    if (!result.success) {
      setCloudStatus("불러오기 실패");
      alert("불러오기 실패");
      return;
    }

    const period = getCurrentPeriodKey();
    ensurePeriodRecord(period);

    state.students.forEach(student=>{
      state.records[period][student][currentCategory] = {
        value: getDefaultValue(currentCategory),
        note: ""
      };
    });

    result.rows.forEach(row => {
      if (!state.records[period][row.student]) return;
      state.records[period][row.student][currentCategory] = {
        value: normalizeValue(currentCategory, row.status),
        note: row.note || ""
      };
    });

    saveState();
    render();
    setCloudStatus("불러오기 완료");
  }catch(err){
    setCloudStatus("불러오기 실패");
    alert("클라우드 불러오기 중 오류가 생겼어.");
  }
}

function bind(){document.getElementById("currentDate").onchange=e=>{currentDate=e.target.value||today(); refreshCurrentWeekKey(); render()}; document.getElementById("currentCategory").onchange=e=>{currentCategory=e.target.value; draftNotes={}; refreshCurrentWeekKey(); render()}; document.getElementById("weekSelect").onchange=e=>{currentWeekKey=e.target.value; draftNotes={}; render()}; document.getElementById("todayBtn").onclick=()=>{currentDate=today(); refreshCurrentWeekKey(); render()}; document.getElementById("loadCloudBtn").onclick=loadCurrentFromCloud; document.getElementById("saveCloudBtn").onclick=saveCurrentToCloud; document.getElementById("goHistoryBtn").onclick=()=>document.getElementById("historySection").scrollIntoView({behavior:"smooth", block:"start"}); document.getElementById("searchInput").oninput=render; document.querySelectorAll("[data-filter]").forEach(btn=>btn.onclick=()=>{filterMode=btn.dataset.filter; render()}); document.getElementById("studentInput").onkeydown=e=>{if(e.key==="Enter") document.getElementById("addStudentBtn").click()}; document.getElementById("addStudentBtn").onclick=()=>{const name=document.getElementById("studentInput").value.trim(); if(!name) return; if(state.students.includes(name)){alert("이미 있는 학생 이름이야."); return;} state.students.push(name); document.getElementById("studentInput").value=""; render()}; document.getElementById("categoryInput").onkeydown=e=>{if(e.key==="Enter") document.getElementById("addCategoryBtn").click()}; document.getElementById("addCategoryBtn").onclick=()=>{const name=document.getElementById("categoryInput").value.trim(); if(!name) return; if(state.categories.includes(name)){alert("이미 있는 체크 항목이야."); return;} state.categories.push(name); Object.keys(state.records).forEach(period=>state.students.forEach(student=>{state.records[period][student][name]={value:"미제출",note:""}})); currentCategory=name; document.getElementById("categoryInput").value=""; render()}; document.getElementById("pasteStudentsBtn").onclick=()=>{const text=document.getElementById("studentPasteInput").value; addStudents(parseNamesFromText(text))}; document.getElementById("importFileBtn").onclick=()=>handleFileImport(false); document.getElementById("replaceStudentsBtn").onclick=()=>handleFileImport(true); ["historyStart","historyEnd","historyStudent","historyCategory","historyMode"].forEach(id=>document.getElementById(id).onchange=render); document.getElementById("clearPeriodBtn").onclick=()=>{document.getElementById("historyStart").value=""; document.getElementById("historyEnd").value=""; render()}; document.getElementById("exportBtn").onclick=exportCsv; document.getElementById("backupBtn").onclick=exportBackup; document.getElementById("restoreBtn").onclick=()=>document.getElementById("restoreFileInput").click(); document.getElementById("restoreFileInput").onchange=e=>restoreBackupFromFile(e.target.files?.[0]); document.getElementById("resetBtn").onclick=()=>{if(!confirm(`${formatPeriodKey(getCurrentPeriodKey())}의 '${currentCategory}' 항목을 초기화할까요?`)) return; const period=getCurrentPeriodKey(); ensurePeriodRecord(period); state.students.forEach(student=>{state.records[period][student][currentCategory]={value:getDefaultValue(currentCategory),note:""}}); render()}}
refreshCurrentWeekKey(); ensurePeriodRecord(getCurrentPeriodKey()); bind(); render();
